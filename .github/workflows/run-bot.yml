name: Run SLRC News Bot

on:
  schedule:
    # Hora de San Luis Río Colorado (UTC-7)
    # 04:00 AM SLRC = 11:00 UTC
    # 04:00 PM SLRC = 23:00 UTC
    - cron: '0 11,23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run bot
        run: python telegram_bot.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Save sent news
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add noticias_enviadas.json
          git commit -m "update sent news" || echo "No changes"
          git push
